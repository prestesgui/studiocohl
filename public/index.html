<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Guilherme Prestes | Motion Designer</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;700;900&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:'Inter',sans-serif;
background:#fff;
overflow-x:hidden;
}

/* HEADER */

header{
position:fixed;
top:0;
left:0;
width:100%;
height:72px;
background:#fff;
display:flex;
justify-content:space-between;
align-items:center;
padding:0 40px;
z-index:1000;
border-bottom:1px solid #eee;
}

nav a{
margin-left:30px;
text-decoration:none;
color:#111;
font-size:13px;
}

/* HERO */

.hero{
position:relative;
height:100vh;
margin-top:72px;
margin-left:12px;
margin-right:12px;
border-radius:24px;
overflow:hidden;
background:#000;
}

/* VIDEO BASE (HERO MODE) */

#heroVideo{
position:absolute;
inset:0;
width:100%;
height:100%;
object-fit:cover;
filter:grayscale(100%) blur(3px) brightness(.5);
z-index:1;
}

/* OVERLAY */

.overlay{
position:absolute;
inset:0;
background:rgba(0,0,0,.25);
z-index:2;
}

/* NOISE ANIMADO */

.noise{
position:absolute;
inset:0;
z-index:3;
pointer-events:none;
opacity:.12;
background-image:
repeating-radial-gradient(circle at 20% 30%, rgba(255,255,255,.06) 0 1px, transparent 1px 6px),
repeating-radial-gradient(circle at 70% 60%, rgba(255,255,255,.04) 0 1px, transparent 1px 5px);
mix-blend-mode:overlay;
animation:noiseMove .2s infinite linear;
}

@keyframes noiseMove{
0%{transform:translate(0,0);}
25%{transform:translate(-1%,1%);}
50%{transform:translate(1%,-1%);}
75%{transform:translate(-1%,-1%);}
100%{transform:translate(1%,1%);}
}

/* HERO TEXT */

.hero-title{
position:absolute;
z-index:5;
top:80px;
left:80px;
font-size:clamp(60px,7vw,140px);
font-weight:900;
color:white;
line-height:0.9;
}

/* PLAY BUTTON */

.play-btn{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
width:90px;
height:90px;
border-radius:50%;
border:none;
cursor:pointer;
z-index:10;
font-size:28px;
background:#fff;
transition:0.3s ease;
}

.play-btn:hover{
transform:translate(-50%,-50%) scale(1.1);
}

/* LETS TALK */

.lets-talk{
position:absolute;
right:40px;
bottom:40px;
z-index:10;
background:#111;
color:#fff;
padding:10px 18px;
border-radius:999px;
font-size:12px;
text-decoration:none;
transition:0.3s ease;
}

.lets-talk:hover{
transform:scale(1.05);
}

/* CARD */

.card{
position:absolute;
left:40px;
bottom:40px;
z-index:10;
display:flex;
gap:15px;
align-items:center;
background:#fff;
padding:12px;
border-radius:16px;
}

.card img{
width:80px;
height:80px;
border-radius:12px;
object-fit:cover;
}

.card small{
display:block;
color:#777;
}

/* ===== VIDEO PLAYER OVERLAY ===== */

.video-player-overlay{
position:fixed;
top:0;
left:0;
right:0;
bottom:0;
background:rgba(0,0,0,.9);
z-index:9998;
display:none;
align-items:center;
justify-content:center;
opacity:0;
transition:opacity 0.3s ease;
}

.video-player-overlay.active{
display:flex;
opacity:1;
}

.video-player-container{
position:relative;
width:90%;
max-width:1400px;
aspect-ratio:16/9;
background:#000;
border-radius:12px;
overflow:hidden;
}

.video-player-container video{
width:100%;
height:100%;
object-fit:contain;
}

/* CLOSE BUTTON */

.close-video-btn{
position:absolute;
top:20px;
right:20px;
width:50px;
height:50px;
border-radius:50%;
border:none;
background:rgba(255,255,255,.2);
color:#fff;
font-size:28px;
cursor:pointer;
backdrop-filter:blur(10px);
z-index:10000;
display:flex;
align-items:center;
justify-content:center;
transition:0.3s ease;
}

.close-video-btn:hover{
background:rgba(255,255,255,.3);
}

/* CONTROLES */

.controls{
position:absolute;
bottom:20px;
left:50%;
transform:translateX(-50%);
display:flex;
gap:10px;
align-items:center;
background:rgba(0,0,0,.8);
padding:10px 14px;
border-radius:999px;
z-index:10000;
backdrop-filter:blur(10px);
width:auto;
}

.controls button{
background:#fff;
border:none;
padding:6px 10px;
border-radius:8px;
cursor:pointer;
font-size:14px;
transition:0.2s ease;
}

.controls button:hover{
background:#ddd;
}

.controls input[type="range"]{
width:140px;
}

</style>
</head>

<body>

<header>
<div><strong>Guilherme Prestes</strong></div>
<nav>
<a href="#work">Work</a>
<a href="#about">About</a>
<a href="#contact">Contact</a>
</nav>
</header>

<section class="hero" id="hero">

<video id="heroVideo" autoplay muted loop playsinline>
<source src="assets/showreel.mp4" type="video/mp4">
</video>

<div class="overlay"></div>
<div class="noise"></div>

<h1 class="hero-title">
Guilherme<br>Prestes
</h1>

<button class="play-btn" id="playBtn">▶</button>

<a class="lets-talk" href="https://wa.me/353834661531" target="_blank">
Let's Talk
</a>

<div class="card">
<img src="assets/profile.jpg">
<div>
<strong>Guilherme Prestes</strong>
<small>Motion / Editor</small>
</div>
</div>

</section>

<!-- VIDEO PLAYER OVERLAY -->
<div class="video-player-overlay" id="videoPlayerOverlay">
<button class="close-video-btn" id="closeBtn">✕</button>

<div class="video-player-container">
<video id="playerVideo" controls>
<source src="assets/showreel.mp4" type="video/mp4">
</video>
<div class="controls">
<button id="pauseBtn">⏸</button>
<input id="progress" type="range" min="0" max="100" value="0">
<button id="muteBtn">🔊</button>
<button id="fsBtn">⛶</button>
</div>
</div>
</div>

<script>

const hero = document.getElementById('hero');
const heroVideo = document.getElementById('heroVideo');
const playBtn = document.getElementById('playBtn');

const videoPlayerOverlay = document.getElementById('videoPlayerOverlay');
const playerVideo = document.getElementById('playerVideo');
const closeBtn = document.getElementById('closeBtn');

/* garante autoplay hero */
heroVideo.play().catch(()=>{});

let isPlaying = false;

/* CLICK PLAY - MOSTRA OVERLAY */
playBtn.addEventListener('click', () => {

isPlaying = true;

/* mostra overlay */
videoPlayerOverlay.classList.add('active');

/* inicia vídeo do player */
playerVideo.currentTime = 0;
playerVideo.play();

setupControls();

});

/* FECHAR */
closeBtn.addEventListener('click', closePlayer);

/* FIM DO VÍDEO */
playerVideo.addEventListener('ended', () => {
closePlayer();
});

/* ESC fecha */
document.addEventListener('keydown', (e) => {
if(e.key === 'Escape' && isPlaying){
closePlayer();
}
});

function closePlayer(){

isPlaying = false;

/* esconde overlay */
videoPlayerOverlay.classList.remove('active');

/* pausa vídeo */
playerVideo.pause();
playerVideo.currentTime = 0;

/* volta hero ao normal */
heroVideo.muted = true;
heroVideo.currentTime = 0;
heroVideo.play().catch(()=>{});

}

/* CONTROLES DO PLAYER */
function setupControls(){

const pauseBtn = document.getElementById('pauseBtn');
const muteBtn = document.getElementById('muteBtn');
const fsBtn = document.getElementById('fsBtn');
const progress = document.getElementById('progress');

pauseBtn.onclick = () => {
if(playerVideo.paused) playerVideo.play();
else playerVideo.pause();
};

muteBtn.onclick = () => {
playerVideo.muted = !playerVideo.muted;
};

fsBtn.onclick = () => {
if(playerVideo.requestFullscreen) playerVideo.requestFullscreen();
else if(playerVideo.webkitRequestFullscreen) playerVideo.webkitRequestFullscreen();
};

playerVideo.ontimeupdate = () => {
progress.value = (playerVideo.currentTime / playerVideo.duration) * 100;
};

progress.oninput = () => {
playerVideo.currentTime = (progress.value / 100) * playerVideo.duration;
};

}

</script>

</body>
</html>
