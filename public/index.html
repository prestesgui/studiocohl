<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Guilherme Prestes | Motion Designer</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;700;900&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:'Inter',sans-serif;
background:#fff;
overflow-x:hidden;
}

/* HEADER */

header{
position:fixed;
top:0;
left:0;
width:100%;
height:72px;
background:#fff;
display:flex;
justify-content:space-between;
align-items:center;
padding:0 40px;
z-index:1000;
border-bottom:1px solid #eee;
}

nav a{
margin-left:30px;
text-decoration:none;
color:#111;
font-size:13px;
}

/* HERO */

.hero{
position:relative;
height:100vh;
margin-top:72px;
margin-left:12px;
margin-right:12px;
border-radius:24px;
overflow:hidden;
background:#000;
transition:0.8s ease;
}

/* VIDEO BASE (HERO MODE) */

#heroVideo{
position:absolute;
inset:0;
width:100%;
height:100%;
object-fit:cover;
filter:grayscale(100%) blur(3px) brightness(.5);
transition:1s ease;
}

/* OVERLAY */

.overlay{
position:absolute;
inset:0;
background:rgba(0,0,0,.25);
z-index:2;
}

/* NOISE ANIMADO (TV EFFECT) */

.noise{
position:absolute;
inset:0;
z-index:3;
pointer-events:none;
opacity:.12;
background-image:url("https://media.giphy.com/media/oEI9uBYSzLpBK/giphy.gif");
mix-blend-mode:overlay;
}

/* HERO TEXT */

.hero-title{
position:absolute;
z-index:5;
top:80px;
left:80px;
font-size:clamp(60px,7vw,140px);
font-weight:900;
color:white;
line-height:0.9;
}

/* PLAY BUTTON */

.play-btn{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
width:90px;
height:90px;
border-radius:50%;
border:none;
cursor:pointer;
z-index:10;
font-size:28px;
}

/* LETS TALK FIXO */

.lets-talk{
position:absolute;
right:40px;
bottom:40px;
z-index:10;
background:#111;
color:#fff;
padding:10px 18px;
border-radius:999px;
font-size:12px;
text-decoration:none;
}

/* CARD */

.card{
position:absolute;
left:40px;
bottom:40px;
z-index:10;
display:flex;
gap:15px;
align-items:center;
background:#fff;
padding:12px;
border-radius:16px;
}

.card img{
width:80px;
height:80px;
border-radius:12px;
object-fit:cover;
}

.card small{
display:block;
color:#777;
}

/* ESTADO PLAYING */

.hero.playing #heroVideo{
object-fit:contain;
filter:none;
background:#000;
}

.hero.playing .hero-title{
display:none;
}

.hero.playing .card{
display:none;
}

.hero.playing .overlay{
opacity:0;
}

.hero.playing .play-btn{
display:none;
}

</style>
</head>

<body>

<header>
<div><strong>Guilherme Prestes</strong></div>
<nav>
<a href="#work">Work</a>
<a href="#about">About</a>
<a href="#contact">Contact</a>
</nav>
</header>

<section class="hero" id="hero">

<video id="heroVideo" autoplay muted loop playsinline>
<source src="assets/showreel.mp4" type="video/mp4">
</video>

<div class="overlay"></div>
<div class="noise"></div>

<h1 class="hero-title">
Guilherme<br>Prestes
</h1>

<button class="play-btn" id="playBtn">▶</button>

<a class="lets-talk" href="https://wa.me/353834661531" target="_blank">
Let’s Talk
</a>

<div class="card">
<img src="assets/profile.jpg">
<div>
<strong>Guilherme Prestes</strong>
<small>Motion / Editor</small>
</div>
</div>

</section>
<script>

const hero = document.getElementById('hero');
const video = document.getElementById('heroVideo');
const playBtn = document.getElementById('playBtn');

/* garante autoplay inicial */
video.play().catch(()=>{});

/* estado player */
let isPlaying = false;

/* CLICK PLAY */
playBtn.addEventListener('click', () => {

isPlaying = true;

/* ativa modo player */
hero.classList.add('playing');

/* remove mute e inicia áudio */
video.muted = false;
video.currentTime = 0;
video.play();

/* cria controles custom simples */
createControls();

});

/* quando vídeo termina → volta pro hero */
video.addEventListener('ended', () => {

resetHero();

});

/* RESET HERO */
function resetHero(){

isPlaying = false;

hero.classList.remove('playing');

video.muted = true;
video.currentTime = 0;
video.play();

/* remove controls */
removeControls();

}

/* CONTROLES */
function createControls(){

if(document.querySelector('.controls')) return;

const controls = document.createElement('div');
controls.className = 'controls';

controls.innerHTML = `
<button id="pauseBtn">⏸</button>
<input id="progress" type="range" min="0" max="100" value="0">
<button id="muteBtn">🔊</button>
<button id="fsBtn">⛶</button>
`;

document.body.appendChild(controls);

/* pause/play */
document.getElementById('pauseBtn').onclick = () => {

if(video.paused){
video.play();
} else {
video.pause();
}

};

/* mute */
document.getElementById('muteBtn').onclick = () => {

video.muted = !video.muted;

};

/* fullscreen */
document.getElementById('fsBtn').onclick = () => {

if(video.requestFullscreen){
video.requestFullscreen();
}

};

/* progress */
const progress = document.getElementById('progress');

video.ontimeupdate = () => {
progress.value = (video.currentTime / video.duration) * 100;
};

progress.oninput = () => {
video.currentTime = (progress.value / 100) * video.duration;
};

}

/* remove controls */
function removeControls(){
const c = document.querySelector('.controls');
if(c) c.remove();
}

</script>

</body>
</html>
<style>

/* =========================
   CONTROLES PLAYER
========================= */

.controls{
position:fixed;
bottom:20px;
left:50%;
transform:translateX(-50%);
display:flex;
gap:10px;
align-items:center;
background:rgba(0,0,0,.6);
padding:10px 14px;
border-radius:999px;
z-index:9999;
backdrop-filter:blur(10px);
}

.controls button{
background:#fff;
border:none;
padding:6px 10px;
border-radius:8px;
cursor:pointer;
font-size:14px;
}

.controls input[type="range"]{
width:140px;
}

/* =========================
   LETS TALK MELHORADO
========================= */

.lets-talk{
position:absolute;
right:40px;
bottom:40px;
z-index:9999;
background:#111;
color:#fff;
padding:14px 22px;
border-radius:999px;
font-size:14px;
text-decoration:none;
transition:0.3s ease;
box-shadow:0 10px 30px rgba(0,0,0,.25);
}

.lets-talk:hover{
transform:scale(1.05);
}

/* no modo play ele continua visível mas mais elegante */
.hero.playing .lets-talk{
opacity:1;
}

/* =========================
   NOISE TV REAL (ANIMADO)
========================= */

.noise{
position:absolute;
inset:0;
z-index:3;
pointer-events:none;
opacity:.12;

/* substitui o GIF por camadas CSS animadas */
background:
repeating-radial-gradient(circle at 20% 30%, rgba(255,255,255,.06) 0 1px, transparent 1px 6px),
repeating-radial-gradient(circle at 70% 60%, rgba(255,255,255,.04) 0 1px, transparent 1px 5px);

mix-blend-mode:overlay;
animation:noiseMove .2s infinite linear;
}

@keyframes noiseMove{
0%{transform:translate(0,0);}
25%{transform:translate(-1%,1%);}
50%{transform:translate(1%,-1%);}
75%{transform:translate(-1%,-1%);}
100%{transform:translate(1%,1%);}
}

/* remove noise no modo player */
.hero.playing .noise{
opacity:0;
}

/* =========================
   GARANTE CAMADAS CORRETAS
========================= */

.hero video{
z-index:1;
}

.overlay{
z-index:2;
}

.noise{
z-index:3;
}

.hero-title{
z-index:5;
}

.play-btn{
z-index:10;
}

.card{
z-index:10;
}

.lets-talk{
z-index:9999;
}

</style>
<script>

/* =========================
   FIX FINAL DE PROPORÇÃO
========================= */

/* garante que o vídeo nunca “quebra” em telas diferentes */
function fixVideoFit(){

const w = window.innerWidth;
const h = window.innerHeight;

/* se estiver em modo player */
if(hero.classList.contains('playing')){

/* evita corte em qualquer proporção */
video.style.width = "100%";
video.style.height = "100%";
video.style.objectFit = "contain";
video.style.background = "#000";

} else {

/* hero mode */
video.style.width = "100%";
video.style.height = "100%";
video.style.objectFit = "cover";

}

}

window.addEventListener('resize', fixVideoFit);
window.addEventListener('orientationchange', fixVideoFit);

/* chama ao iniciar */
fixVideoFit();


/* =========================
   RESET MAIS ROBUSTO
========================= */

function hardReset(){

hero.classList.remove('playing');

video.pause();
video.currentTime = 0;
video.muted = true;

/* volta para loop hero */
video.loop = true;
video.play().catch(()=>{});

/* remove controles se existirem */
document.querySelectorAll('.controls').forEach(c => c.remove());

fixVideoFit();

}

/* sobrescreve evento ended com reset seguro */
video.onended = () => {

hardReset();

};


/* =========================
   PROTEÇÃO iOS / MOBILE BUG
========================= */

document.addEventListener('visibilitychange', () => {

if(document.hidden){

/* pausa leve quando sai da aba */
video.pause();

} else {

if(hero.classList.contains('playing')){
video.play().catch(()=>{});
}

}

});


/* =========================
   SEGURANÇA PLAY STATE
========================= */

setInterval(() => {

/* se entrar em estado quebrado, corrige automaticamente */
if(hero.classList.contains('playing')){

if(video.readyState === 0){
video.load();
}

}

}, 2000);

</script>
