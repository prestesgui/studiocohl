<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Guilherme Prestes • Video Editor & Motion Designer</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
    }

    body {
      font-family: 'Inter', 'Helvetica', 'Arial', sans-serif;
      background: #ffffff;
      color: #000;
      overflow-x: hidden;
    }

    /* HEADER */
    header {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      z-index: 1000;
      height: 72px;
      background: #ffffff;
      border-bottom: 1px solid #e8e8e8;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 40px;
    }

    .header-logo {
      font-size: 14px;
      font-weight: 600;
      letter-spacing: 0.5px;
      text-transform: uppercase;
    }

    nav ul {
      display: flex;
      list-style: none;
      gap: 60px;
      position: absolute;
      left: 50%;
      transform: translateX(-50%);
    }

    nav a {
      font-size: 13px;
      font-weight: 500;
      text-decoration: none;
      color: #000;
      opacity: 0.7;
      transition: opacity 0.3s ease;
      letter-spacing: 0.5px;
      text-transform: uppercase;
    }

    nav a:hover {
      opacity: 1;
    }

    /* HERO SECTION */
    .hero {
      position: relative;
      width: 100%;
      height: calc(100vh - 72px);
      margin-top: 72px;
      padding: 12px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .hero-video-container {
      position: absolute;
      top: 12px;
      left: 12px;
      right: 12px;
      bottom: 0;
      border-radius: 24px;
      overflow: hidden;
      z-index: 0;
      background: #000;
    }

    video {
      width: 100%;
      height: 100%;
      object-fit: cover;
      filter: grayscale(100%) contrast(120%) brightness(45%);
      display: block;
    }

    /* Dark overlay */
    .hero-video-container::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(0, 0, 0, 0.25);
      z-index: 2;
      pointer-events: none;
    }

    /* Grain/Noise Animation */
    .hero-video-container::after {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background-image: url('data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" width="100" height="100"><filter id="noise"><feTurbulence type="fractalNoise" baseFrequency="0.9" numOctaves="4" seed="2" /></filter><rect width="100" height="100" fill="%23000" filter="url(%23noise)" opacity="0.05"/></svg>');
      background-repeat: repeat;
      z-index: 3;
      pointer-events: none;
      animation: grain 0.15s infinite;
    }

    @keyframes grain {
      0%, 100% { transform: translate(0, 0); }
      10% { transform: translate(-2px, -2px); }
      20% { transform: translate(2px, 2px); }
      30% { transform: translate(-1px, 1px); }
      40% { transform: translate(1px, -1px); }
      50% { transform: translate(0, 0); }
      60% { transform: translate(2px, -2px); }
      70% { transform: translate(-2px, 1px); }
      80% { transform: translate(1px, 2px); }
      90% { transform: translate(-1px, -1px); }
    }

    /* Content */
    .hero-content {
      position: relative;
      z-index: 10;
      width: 100%;
      height: 100%;
      display: flex;
      flex-direction: column;
      justify-content: flex-start;
      padding-top: 80px;
      padding-left: 60px;
      padding-right: 60px;
      pointer-events: none;
    }

    .hero-text-left {
      flex: 1;
      display: flex;
      align-items: flex-start;
      justify-content: flex-start;
    }

    .hero-title {
      font-size: clamp(110px, 15vw, 280px);
      font-weight: 900;
      color: #ffffff;
      line-height: 0.9;
      letter-spacing: -4px;
      max-width: 90%;
    }

    .hero-text-right {
      position: absolute;
      top: 50%;
      right: 60px;
      transform: translateY(-50%);
      text-align: right;
    }

    .hero-services {
      font-size: clamp(14px, 2vw, 20px);
      font-weight: 400;
      color: #ffffff;
      line-height: 1.6;
      opacity: 0.9;
      letter-spacing: 0.5px;
    }

    /* Floating Card */
    .floating-card {
      position: absolute;
      bottom: 40px;
      right: 40px;
      z-index: 20;
      background: #ffffff;
      border-radius: 20px;
      padding: 24px;
      display: flex;
      align-items: center;
      gap: 20px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.15);
      pointer-events: auto;
      transition: transform 0.3s ease;
    }

    .floating-card:hover {
      transform: translateY(-4px);
    }

    .card-image {
      width: 80px;
      height: 80px;
      border-radius: 12px;
      overflow: hidden;
      flex-shrink: 0;
      background: #f0f0f0;
    }

    .card-image img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .card-content {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .card-role {
      font-size: 12px;
      color: #999;
      font-weight: 500;
      letter-spacing: 0.5px;
      text-transform: uppercase;
    }

    .card-name {
      font-size: 18px;
      font-weight: 700;
      color: #000;
      line-height: 1;
    }

    .card-button {
      margin-top: 8px;
      padding: 10px 24px;
      background: #000;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      letter-spacing: 0.5px;
      text-transform: uppercase;
      transition: all 0.3s ease;
      pointer-events: auto;
    }

    .card-button:hover {
      background: #333;
      transform: scale(1.05);
    }

    /* Hamburger Menu */
    .hamburger {
      display: none;
      flex-direction: column;
      cursor: pointer;
      gap: 5px;
    }

    .hamburger span {
      width: 24px;
      height: 2px;
      background: #000;
      transition: all 0.3s ease;
    }

    .hamburger.active span:nth-child(1) {
      transform: rotate(45deg) translate(8px, 8px);
    }

    .hamburger.active span:nth-child(2) {
      opacity: 0;
    }

    .hamburger.active span:nth-child(3) {
      transform: rotate(-45deg) translate(7px, -7px);
    }

    /* Mobile Menu */
    .mobile-menu {
      display: none;
      position: fixed;
      top: 72px;
      left: 0;
      right: 0;
      background: #ffffff;
      border-bottom: 1px solid #e8e8e8;
      flex-direction: column;
      gap: 20px;
      padding: 40px;
      z-index: 999;
      animation: slideDown 0.3s ease;
    }

    .mobile-menu.active {
      display: flex;
    }

    @keyframes slideDown {
      from {
        opacity: 0;
        transform: translateY(-20px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .mobile-menu a {
      font-size: 16px;
      font-weight: 500;
      color: #000;
      text-decoration: none;
      letter-spacing: 0.5px;
      text-transform: uppercase;
    }

    /* TABLET */
    @media (max-width: 1024px) {
      header {
        padding: 0 24px;
      }

      .hero-content {
        padding-left: 40px;
        padding-right: 40px;
        padding-top: 60px;
      }

      .hero-title {
        font-size: clamp(80px, 12vw, 200px);
      }

      .hero-text-right {
        right: 40px;
      }

      .floating-card {
        bottom: 30px;
        right: 30px;
        padding: 20px;
        gap: 16px;
      }

      .card-image {
        width: 70px;
        height: 70px;
      }

      .card-name {
        font-size: 16px;
      }
    }

    /* MOBILE */
    @media (max-width: 768px) {
      header {
        padding: 0 20px;
      }

      nav ul {
        display: none;
      }

      .hamburger {
        display: flex;
      }

      .hero {
        padding: 8px;
      }

      .hero-video-container {
        top: 8px;
        left: 8px;
        right: 8px;
        border-radius: 16px;
      }

      .hero-content {
        padding-left: 24px;
        padding-right: 24px;
        padding-top: 40px;
      }

      .hero-title {
        font-size: clamp(48px, 10vw, 140px);
        max-width: 100%;
      }

      .hero-text-right {
        position: static;
        transform: none;
        text-align: left;
        margin-top: 40px;
      }

      .hero-services {
        font-size: 14px;
      }

      .floating-card {
        position: static;
        margin-top: 40px;
        width: fit-content;
      }

      .mobile-menu {
        padding: 30px 20px;
      }

      .mobile-menu a {
        font-size: 14px;
      }
    }

    /* EXTRA SMALL */
    @media (max-width: 480px) {
      .hero-content {
        padding-top: 30px;
      }

      .hero-title {
        font-size: clamp(36px, 8vw, 100px);
      }

      .floating-card {
        flex-direction: column;
        text-align: center;
        padding: 16px;
      }

      .card-image {
        width: 64px;
        height: 64px;
      }

      .card-role {
        font-size: 11px;
      }

      .card-name {
        font-size: 14px;
      }

      .card-button {
        width: 100%;
      }
    }
  </style>
</head>
<body>

  <!-- HEADER -->
  <header>
    <div class="header-logo">Guilherme Prestes</div>
    
    <nav>
      <ul>
        <li><a href="#work">Work</a></li>
        <li><a href="#about">About</a></li>
        <li><a href="#contact">Contact</a></li>
      </ul>
    </nav>

    <div class="hamburger" id="hamburger">
      <span></span>
      <span></span>
      <span></span>
    </div>
  </header>

  <!-- MOBILE MENU -->
  <nav class="mobile-menu" id="mobileMenu">
    <a href="#work">Work</a>
    <a href="#about">About</a>
    <a href="#contact">Contact</a>
  </nav>

  <!-- HERO SECTION -->
  <section class="hero">
    <!-- Video Background -->
    <div class="hero-video-container">
      <video id="heroVideo" autoplay muted loop playsinline preload="auto">
        <source src="assets/showreel.mp4" type="video/mp4">
      </video>
    </div>

    <!-- Content -->
    <div class="hero-content">
      <div class="hero-text-left">
        <h1 class="hero-title">Guilherme Prestes</h1>
      </div>

      <div class="hero-text-right">
        <div class="hero-services">
          Video Editor<br>Motion Designer
        </div>
      </div>
    </div>

    <!-- Floating Card -->
    <div class="floating-card">
      <div class="card-image">
        <img src="assets/profile.jpg" alt="Guilherme Prestes">
      </div>
      <div class="card-content">
        <div class="card-role">Video Editor / Motion Designer</div>
        <div class="card-name">Guilherme Prestes</div>
        <button class="card-button">Let's Talk</button>
      </div>
    </div>
  </section>

  <script>
    // Mobile Menu Toggle
    const hamburger = document.getElementById('hamburger');
    const mobileMenu = document.getElementById('mobileMenu');

    hamburger.addEventListener('click', () => {
      hamburger.classList.toggle('active');
      mobileMenu.classList.toggle('active');
    });

    // Close menu when clicking on a link
    const mobileMenuLinks = mobileMenu.querySelectorAll('a');
    mobileMenuLinks.forEach(link => {
      link.addEventListener('click', () => {
        hamburger.classList.remove('active');
        mobileMenu.classList.remove('active');
      });
    });

    // Force video to play
    const heroVideo = document.getElementById('heroVideo');
    
    // Try to play video
    const playPromise = heroVideo.play();
    
    if (playPromise !== undefined) {
      playPromise.catch(error => {
        console.log('Autoplay bloqueado:', error);
        // Se o autoplay foi bloqueado, o vídeo terá play no primeiro clique
        document.addEventListener('click', () => {
          heroVideo.play();
        }, { once: true });
      });
    }

    // Garante que o vídeo inicia quando carregado
    heroVideo.addEventListener('loadeddata', () => {
      heroVideo.play().catch(error => {
        console.log('Erro ao reproduzir:', error);
      });
    });
  </script>

</body>
</html>
